<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <style>
    /* 适配浏览器标签栏：浅色系统用石色砖、深色系统用暖炭砖；靛蓝竖条始终一致 */
    @media (prefers-color-scheme: light) {
      .bg { fill: #efede7; }
      .f { fill: #1c1b18; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #17161a; }
      .f { fill: #e3dfd6; }
    }
    .bar { fill: #2a3a78; }
  </style>
  <rect class="bg" width="32" height="32"/>
  <rect class="bar" x="3" y="6" width="5" height="20"/>
  <text x="12" y="23" class="f"
    font-family="'JetBrains Mono','IBM Plex Mono','SF Mono',Menlo,Consolas,monospace"
    font-size="18" font-weight="600">f</text>
</svg>
