<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <!-- SEO Meta -->
  <title>文章归档 | foxerw 的博客</title>
  <meta name="description" content="所有文章归档，按时间线查看">
  <meta name="keywords" content="归档，文章列表">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="images/logo.svg">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css?v=1772944793">
  
  <!-- 归档页面特定样式 -->
  <style>
    .archive-header {
      padding: calc(var(--navbar-height) + var(--spacing-12)) 0 var(--spacing-8);
      text-align: center;
    }
    
    .archive-title {
      font-size: var(--text-4xl);
      font-weight: var(--font-bold);
      margin-bottom: var(--spacing-4);
    }
    
    .archive-stats {
      font-size: var(--text-lg);
      color: var(--color-text-secondary);
    }
    
    /* 时间线样式 */
    .timeline {
      position: relative;
      max-width: 800px;
      margin: 0 auto;
      padding: var(--spacing-8) 0;
    }
    
    .timeline::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--color-border);
    }
    
    .year-section {
      margin-bottom: var(--spacing-12);
    }
    
    .year-header {
      position: relative;
      padding-left: var(--spacing-8);
      margin-bottom: var(--spacing-6);
    }
    
    .year-header::before {
      content: attr(data-year);
      position: absolute;
      left: calc(-1 * var(--spacing-8) - 8px);
      top: 50%;
      transform: translateY(-50%);
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-accent);
      color: #ffffff;
      font-weight: var(--font-bold);
      font-size: var(--text-sm);
      border-radius: var(--radius-full);
      border: 3px solid var(--color-bg-primary);
    }
    
    .year-title {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: var(--color-text-primary);
      margin-bottom: var(--spacing-2);
    }
    
    .year-count {
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
    }
    
    .month-group {
      margin-bottom: var(--spacing-8);
      padding-left: var(--spacing-8);
    }
    
    .month-title {
      font-size: var(--text-lg);
      font-weight: var(--font-semibold);
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-4);
      padding-bottom: var(--spacing-2);
      border-bottom: 1px solid var(--color-border-light);
    }
    
    .article-list {
      list-style: none;
      padding: 0;
    }
    
    .article-item {
      display: flex;
      align-items: baseline;
      gap: var(--spacing-4);
      padding: var(--spacing-3) 0;
      border-bottom: 1px solid var(--color-border-light);
      transition: all var(--transition-fast);
    }
    
    .article-item:hover {
      border-bottom-color: var(--color-accent);
    }
    
    .article-item:hover .article-link {
      color: var(--color-accent);
    }
    
    .article-date {
      flex-shrink: 0;
      min-width: 100px;
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
      font-family: var(--font-mono);
    }
    
    .article-link {
      flex: 1;
      font-size: var(--text-base);
      color: var(--color-text-primary);
      text-decoration: none;
      font-weight: var(--font-medium);
      transition: color var(--transition-fast);
    }
    
    .article-link:hover {
      text-decoration: none;
    }
    
    .article-tags {
      display: flex;
      gap: var(--spacing-2);
      flex-shrink: 0;
    }
    
    @media (max-width: 640px) {
      .article-item {
        flex-direction: column;
        gap: var(--spacing-2);
      }
      
      .article-date {
        min-width: auto;
      }
      
      .article-tags {
        flex-wrap: wrap;
      }
    }
    
    /* 搜索框 */
    .search-box {
      max-width: 500px;
      margin: var(--spacing-8) auto;
      position: relative;
    }
    
    .search-input {
      width: 100%;
      padding: var(--spacing-4) var(--spacing-12);
      font-size: var(--text-base);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-full);
      background-color: var(--color-bg-primary);
      color: var(--color-text-primary);
      transition: all var(--transition-fast);
    }
    
    .search-input:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px var(--color-accent-light);
    }
    
    .search-icon {
      position: absolute;
      left: var(--spacing-4);
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-tertiary);
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: var(--spacing-12);
      color: var(--color-text-tertiary);
    }
    
    .empty-state svg {
      margin: 0 auto var(--spacing-4);
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <header class="navbar" role="banner">
    <div class="navbar-content">
      <a href="index.html" class="navbar-brand" aria-label="返回首页">
        <img src="images/logo.svg" alt="Logo" class="navbar-logo" width="36" height="36" onerror="this.style.display='none'">
        <span>foxerw 的博客</span>
      </a>
      
      <nav class="navbar-menu" role="navigation" aria-label="主导航">
        <a href="index.html" class="navbar-link">首页</a>
        <a href="archive.html" class="navbar-link active" aria-current="page">归档</a>
        <a href="categories.html" class="navbar-link">分类</a>
        <a href="tags.html" class="navbar-link">标签</a>
        <a href="about.html" class="navbar-link">关于</a>
        
        <!-- 主题切换按钮 -->
        <button class="theme-toggle" aria-label="切换主题" title="点击切换主题">
          <span class="icon-sun" aria-hidden="true">☀️</span>
          <span class="icon-moon" aria-hidden="true">🌙</span>
        </button>
      </nav>
      
      <!-- 汉堡菜单按钮 -->
      <button class="hamburger" aria-label="菜单" aria-expanded="false" aria-controls="navbar-menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>
  
  <!-- 主内容区 -->
  <main class="page-wrapper">
    <div class="container">
      <!-- 头部 -->
      <header class="archive-header">
        <h1 class="archive-title">📚 文章归档</h1>
        <p class="archive-stats" id="archive-stats">加载中...</p>
        
        <!-- 搜索框 -->
        <div class="search-box">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" class="search-input" id="archive-search" placeholder="搜索文章..." aria-label="搜索文章">
        </div>
      </header>
      
      <!-- 时间线 -->
      <div class="timeline" id="archive-timeline">
        <p style="text-align: center; color: var(--color-text-tertiary);">加载中...</p>
      </div>
    </div>
  </main>
  
  <!-- 页脚 -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer-content">
        <p class="footer-text">
          © 2024 foxerw 的博客。All rights reserved.
        </p>
        <div class="footer-links">
          <a href="about.html" class="footer-link">关于</a>
          <a href="feed.xml" class="footer-link">RSS</a>
          <a href="sitemap.xml" class="footer-link">站点地图</a>
        </div>
      </div>
    </div>
  </footer>
  
  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/archive.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
