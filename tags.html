<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <!-- SEO Meta -->
  <title>标签 | foxerw 的博客</title>
  <meta name="description" content="按标签浏览文章">
  <meta name="keywords" content="标签，文章标签">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="images/logo.svg">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- 标签页面特定样式 -->
  <style>
    .tags-header {
      padding: calc(var(--navbar-height) + var(--spacing-12)) 0 var(--spacing-8);
      text-align: center;
    }
    
    .tags-title {
      font-size: var(--text-4xl);
      font-weight: var(--font-bold);
      margin-bottom: var(--spacing-4);
    }
    
    .tags-stats {
      font-size: var(--text-lg);
      color: var(--color-text-secondary);
    }
    
    /* 标签云 */
    .tags-cloud {
      max-width: 900px;
      margin: var(--spacing-12) auto;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--spacing-3);
    }
    
    .tag-cloud-item {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-2);
      padding: var(--spacing-3) var(--spacing-5);
      background: linear-gradient(135deg, var(--color-bg-secondary), var(--color-bg-tertiary));
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-full);
      text-decoration: none;
      font-size: var(--text-sm);
      font-weight: var(--font-medium);
      color: var(--color-text-secondary);
      transition: all var(--transition-normal);
      cursor: pointer;
    }
    
    .tag-cloud-item:hover {
      background: var(--color-accent);
      color: #ffffff;
      text-decoration: none;
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
      border-color: var(--color-accent);
    }
    
    .tag-cloud-item .count {
      background: rgba(0, 0, 0, 0.1);
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: 0.75rem;
    }
    
    .tag-cloud-item:hover .count {
      background: rgba(255, 255, 255, 0.2);
    }
    
    /* 标签大小 */
    .tag-size-1 { font-size: var(--text-xs); }
    .tag-size-2 { font-size: var(--text-sm); }
    .tag-size-3 { font-size: var(--text-base); }
    .tag-size-4 { font-size: var(--text-lg); font-weight: var(--font-semibold); }
    .tag-size-5 { font-size: var(--text-xl); font-weight: var(--font-semibold); }
    
    /* 标签详情 */
    .tag-detail {
      display: none;
      max-width: 900px;
      margin: var(--spacing-12) auto;
      padding: var(--spacing-8);
      background: var(--color-bg-secondary);
      border-radius: var(--radius-xl);
      border: 1px solid var(--color-border-light);
    }
    
    .tag-detail.active {
      display: block;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .tag-detail-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-6);
      padding-bottom: var(--spacing-4);
      border-bottom: 2px solid var(--color-accent);
    }
    
    .tag-detail-title {
      font-size: var(--text-2xl);
      font-weight: var(--font-bold);
      color: var(--color-text-primary);
    }
    
    .tag-detail-count {
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
    }
    
    .tag-close {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg-primary);
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    
    .tag-close:hover {
      background: var(--color-error);
      color: #ffffff;
    }
    
    /* 文章列表 */
    .tag-articles-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-6);
    }
    
    /* 搜索框 */
    .search-box {
      max-width: 500px;
      margin: var(--spacing-8) auto;
      position: relative;
    }
    
    .search-input {
      width: 100%;
      padding: var(--spacing-4) var(--spacing-12);
      font-size: var(--text-base);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-full);
      background-color: var(--color-bg-primary);
      color: var(--color-text-primary);
      transition: all var(--transition-fast);
    }
    
    .search-input:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px var(--color-accent-light);
    }
    
    .search-icon {
      position: absolute;
      left: var(--spacing-4);
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-tertiary);
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: var(--spacing-12);
      color: var(--color-text-tertiary);
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <header class="navbar" role="banner">
    <div class="navbar-content">
      <a href="index.html" class="navbar-brand" aria-label="返回首页">
        <img src="images/logo.svg" alt="Logo" class="navbar-logo" width="36" height="36" onerror="this.style.display='none'">
        <span>foxerw 的博客</span>
      </a>
      
      <nav class="navbar-menu" role="navigation" aria-label="主导航">
        <a href="index.html" class="navbar-link">首页</a>
        <a href="archive.html" class="navbar-link">归档</a>
        <a href="categories.html" class="navbar-link">分类</a>
        <a href="tags.html" class="navbar-link active" aria-current="page">标签</a>
        <a href="about.html" class="navbar-link">关于</a>
        
        <!-- 主题切换按钮 -->
        <button class="theme-toggle" aria-label="切换主题" title="点击切换主题">
          <span class="icon-sun" aria-hidden="true">☀️</span>
          <span class="icon-moon" aria-hidden="true">🌙</span>
        </button>
      </nav>
      
      <!-- 汉堡菜单按钮 -->
      <button class="hamburger" aria-label="菜单" aria-expanded="false" aria-controls="navbar-menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>
  
  <!-- 主内容区 -->
  <main class="page-wrapper">
    <div class="container">
      <!-- 头部 -->
      <header class="tags-header">
        <h1 class="tags-title">🏷️ 标签云</h1>
        <p class="tags-stats" id="tags-stats">加载中...</p>
        
        <!-- 搜索框 -->
        <div class="search-box">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" class="search-input" id="tags-search" placeholder="搜索标签..." aria-label="搜索标签">
        </div>
      </header>
      
      <!-- 标签云 -->
      <div class="tags-cloud" id="tags-cloud">
        <p style="text-align: center; color: var(--color-text-tertiary); width: 100%;">加载中...</p>
      </div>
      
      <!-- 标签详情 -->
      <div class="tag-detail" id="tag-detail">
        <div class="tag-detail-header">
          <div>
            <h2 class="tag-detail-title" id="tag-detail-title"></h2>
            <p class="tag-detail-count" id="tag-detail-count"></p>
          </div>
          <button class="tag-close" aria-label="关闭">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="tag-articles-list" id="tag-articles-list"></div>
      </div>
    </div>
  </main>
  
  <!-- 页脚 -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer-content">
        <p class="footer-text">
          © 2024 foxerw 的博客。All rights reserved.
        </p>
        <div class="footer-links">
          <a href="about.html" class="footer-link">关于</a>
          <a href="feed.xml" class="footer-link">RSS</a>
          <a href="sitemap.xml" class="footer-link">站点地图</a>
        </div>
      </div>
    </div>
  </footer>
  
  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/tags.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
