<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <!-- SEO Meta -->
  <title>404 - 页面未找到 | foxerw 的博客</title>
  <meta name="description" content="抱歉，您访问的页面不存在">
  <meta name="robots" content="noindex">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="images/logo.svg">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- 404 页面特定样式 -->
  <style>
    .error-page {
      min-height: calc(100vh - var(--navbar-height));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-12) 0;
    }
    
    .error-content {
      text-align: center;
      max-width: 600px;
      padding: var(--spacing-8);
    }
    
    .error-code {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: var(--font-bold);
      line-height: 1;
      margin-bottom: var(--spacing-4);
      background: linear-gradient(135deg, var(--color-accent), #90a4e8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .error-title {
      font-size: var(--text-3xl);
      font-weight: var(--font-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--spacing-4);
    }
    
    .error-message {
      font-size: var(--text-lg);
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-8);
      line-height: var(--leading-relaxed);
    }
    
    .error-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--spacing-4);
    }
    
    .btn {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-2);
      padding: var(--spacing-3) var(--spacing-6);
      font-size: var(--text-base);
      font-weight: var(--font-medium);
      border-radius: var(--radius-md);
      text-decoration: none;
      transition: all var(--transition-fast);
    }
    
    .btn-primary {
      background-color: var(--color-accent);
      color: #ffffff;
    }
    
    .btn-primary:hover {
      background-color: var(--color-accent-hover);
      text-decoration: none;
      transform: translateY(-2px);
      box-shadow: var(--shadow-md);
    }
    
    .btn-secondary {
      background-color: var(--color-bg-secondary);
      color: var(--color-text-primary);
      border: 1px solid var(--color-border);
    }
    
    .btn-secondary:hover {
      background-color: var(--color-bg-tertiary);
      text-decoration: none;
      transform: translateY(-2px);
    }
    
    .error-illustration {
      margin-bottom: var(--spacing-8);
      opacity: 0.8;
    }
    
    /* 装饰元素 */
    .decoration {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-accent-light), transparent);
      filter: blur(40px);
      z-index: -1;
    }
    
    .decoration-1 {
      top: 20%;
      left: 10%;
    }
    
    .decoration-2 {
      bottom: 20%;
      right: 10%;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <header class="navbar" role="banner">
    <div class="navbar-content">
      <a href="index.html" class="navbar-brand" aria-label="返回首页">
        <img src="images/logo.svg" alt="Logo" class="navbar-logo" width="36" height="36" onerror="this.style.display='none'">
        <span>foxerw 的博客</span>
      </a>
      
      <nav class="navbar-menu" role="navigation" aria-label="主导航">
        <a href="index.html" class="navbar-link">首页</a>
        <a href="archive.html" class="navbar-link">归档</a>
        <a href="categories.html" class="navbar-link">分类</a>
        <a href="tags.html" class="navbar-link">标签</a>
        <a href="about.html" class="navbar-link">关于</a>
        
        <!-- 主题切换按钮 -->
        <button class="theme-toggle" aria-label="切换主题" title="点击切换主题">
          <span class="icon-sun" aria-hidden="true">☀️</span>
          <span class="icon-moon" aria-hidden="true">🌙</span>
          <span class="icon-auto" aria-hidden="true">🔄</span>
        </button>
      </nav>
      
      <!-- 汉堡菜单按钮 -->
      <button class="hamburger" aria-label="菜单" aria-expanded="false" aria-controls="navbar-menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>
  
  <!-- 主内容区 -->
  <main class="page-wrapper">
    <div class="error-page">
      <!-- 装饰元素 -->
      <div class="decoration decoration-1"></div>
      <div class="decoration decoration-2"></div>
      
      <div class="error-content">
        <!-- 插图 -->
        <div class="error-illustration">
          <svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 24 24" fill="none" stroke="var(--color-accent)" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.5;">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="12" y1="8" x2="12" y2="12"></line>
            <line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
        </div>
        
        <!-- 错误代码 -->
        <div class="error-code">404</div>
        
        <!-- 标题 -->
        <h1 class="error-title">哎呀，页面走丢了</h1>
        
        <!-- 描述 -->
        <p class="error-message">
          抱歉，您访问的页面不存在或已被移除。<br>
          可能是链接有误，或者页面已被删除。
        </p>
        
        <!-- 操作按钮 -->
        <div class="error-actions">
          <a href="index.html" class="btn btn-primary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            返回首页
          </a>
          <a href="archive.html" class="btn btn-secondary">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            浏览文章
          </a>
        </div>
      </div>
    </div>
  </main>
  
  <!-- 页脚 -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer-content">
        <p class="footer-text">
          © 2024 foxerw 的博客。All rights reserved.
        </p>
        <div class="footer-links">
          <a href="about.html" class="footer-link">关于</a>
          <a href="feed.xml" class="footer-link">RSS</a>
          <a href="sitemap.xml" class="footer-link">站点地图</a>
        </div>
      </div>
    </div>
  </footer>
  
  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
