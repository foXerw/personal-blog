<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <!-- SEO Meta - 由 JS 动态填充 -->
  <title>文章详情 | foxerw 的博客</title>
  <meta name="author" content="foxerw">
  
  <!-- Open Graph -->
  <meta property="og:type" content="article">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="images/logo.svg">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Marked.js Markdown 渲染 -->
  <script src="https://cdn.staticfile.org/marked/11.1.1/marked.min.js"></script>
  
  <!-- Highlight.js 代码高亮 -->
  <link rel="stylesheet" href="https://cdn.staticfile.org/highlight.js/11.9.0/styles/github.min.css" id="hljs-light">
  <link rel="stylesheet" href="https://cdn.staticfile.org/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-dark" disabled>
  <script src="https://cdn.staticfile.org/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.staticfile.org/highlight.js/11.9.0/languages/javascript.min.js"></script>
  <script src="https://cdn.staticfile.org/highlight.js/11.9.0/languages/css.min.js"></script>
  <script src="https://cdn.staticfile.org/highlight.js/11.9.0/languages/xml.min.js"></script>
  <script src="https://cdn.staticfile.org/highlight.js/11.9.0/languages/bash.min.js"></script>
  
  <!-- Preload -->
  <link rel="preconnect" href="https://cdn.staticfile.org">
  
  <!-- 文章详情页特定样式 -->
  <style>
    .post-header {
      margin-bottom: var(--spacing-12);
      text-align: center;
    }
    
    .post-title {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: var(--font-bold);
      margin-bottom: var(--spacing-6);
      line-height: var(--leading-tight);
    }
    
    .post-meta {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--spacing-4);
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
      margin-bottom: var(--spacing-6);
    }
    
    .post-meta-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-2);
    }
    
    .post-cover {
      width: 100%;
      max-height: 500px;
      object-fit: cover;
      border-radius: var(--radius-xl);
      margin: var(--spacing-8) auto;
      box-shadow: var(--shadow-lg);
    }
    
    .post-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: var(--spacing-2);
    }
    
    /* 文章目录 */
    .toc-container {
      position: sticky;
      top: calc(var(--navbar-height) + var(--spacing-8));
      padding: var(--spacing-6);
      background-color: var(--color-bg-secondary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border-light);
      max-height: calc(100vh - var(--navbar-height) - var(--spacing-16));
      overflow-y: auto;
    }
    
    .toc-title {
      font-size: var(--text-sm);
      font-weight: var(--font-semibold);
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      margin-bottom: var(--spacing-4);
      padding-bottom: var(--spacing-2);
      border-bottom: 1px solid var(--color-border);
    }
    
    .toc-list {
      list-style: none;
      padding: 0;
    }
    
    .toc-list li {
      margin-bottom: var(--spacing-2);
    }
    
    .toc-link {
      display: block;
      padding: var(--spacing-2) 0;
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      text-decoration: none;
      transition: all var(--transition-fast);
      border-left: 2px solid transparent;
      padding-left: var(--spacing-3);
    }
    
    .toc-link:hover {
      color: var(--color-accent);
      text-decoration: none;
      border-left-color: var(--color-accent);
      background-color: var(--color-accent-light);
    }
    
    .toc-link.active {
      color: var(--color-accent);
      border-left-color: var(--color-accent);
      font-weight: var(--font-medium);
    }
    
    .toc-level-2 { padding-left: var(--spacing-3); }
    .toc-level-3 { padding-left: var(--spacing-6); }
    .toc-level-4 { padding-left: var(--spacing-8); }
    
    /* 文章导航 */
    .post-navigation {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-6);
      margin-top: var(--spacing-12);
      padding-top: var(--spacing-8);
      border-top: 1px solid var(--color-border);
    }
    
    @media (max-width: 640px) {
      .post-navigation {
        grid-template-columns: 1fr;
      }
    }
    
    .post-nav-item {
      display: flex;
      flex-direction: column;
      padding: var(--spacing-6);
      background-color: var(--color-bg-secondary);
      border-radius: var(--radius-lg);
      text-decoration: none;
      transition: all var(--transition-normal);
    }
    
    .post-nav-item:hover {
      background-color: var(--color-bg-tertiary);
      text-decoration: none;
      transform: translateY(-2px);
    }
    
    .post-nav-label {
      font-size: var(--text-xs);
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: var(--tracking-wide);
      margin-bottom: var(--spacing-2);
    }
    
    .post-nav-title {
      font-size: var(--text-base);
      font-weight: var(--font-medium);
      color: var(--color-text-primary);
      line-height: var(--leading-snug);
    }
    
    .post-nav-item.prev .post-nav-title {
      color: var(--color-accent);
    }
    
    /* 代码块复制按钮样式调整 */
    pre {
      position: relative;
    }
    
    .code-copy-btn span {
      display: none;
    }
    
    @media (min-width: 640px) {
      .code-copy-btn span {
        display: inline;
      }
    }
    
    /* 阅读进度提示 */
    .reading-progress-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 3px;
      background: var(--color-border-light);
      z-index: var(--z-fixed);
    }
    
    .reading-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--color-accent), var(--color-accent-hover));
      transition: width 0.1s ease;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <header class="navbar" role="banner">
    <div class="navbar-content">
      <a href="index.html" class="navbar-brand" aria-label="返回首页">
        <img src="images/logo.svg" alt="Logo" class="navbar-logo" width="36" height="36" onerror="this.style.display='none'">
        <span>foxerw 的博客</span>
      </a>
      
      <nav class="navbar-menu" role="navigation" aria-label="主导航">
        <a href="index.html" class="navbar-link">首页</a>
        <a href="archive.html" class="navbar-link">归档</a>
        <a href="categories.html" class="navbar-link">分类</a>
        <a href="tags.html" class="navbar-link">标签</a>
        <a href="about.html" class="navbar-link">关于</a>
        
        <!-- 主题切换按钮 -->
        <button class="theme-toggle" aria-label="切换主题" title="点击切换主题">
          <span class="icon-sun" aria-hidden="true">☀️</span>
          <span class="icon-moon" aria-hidden="true">🌙</span>
        </button>
      </nav>
      
      <!-- 汉堡菜单按钮 -->
      <button class="hamburger" aria-label="菜单" aria-expanded="false" aria-controls="navbar-menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>
  
  <!-- 主内容区 -->
  <main class="page-wrapper">
    <div class="container">
      <div class="main-content">
        <!-- 文章内容区 -->
        <article class="content-area">
          <!-- 文章头部 -->
          <header class="post-header">
            <h1 class="post-title" id="post-title">加载中...</h1>
            
            <div class="post-meta">
              <span class="post-meta-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <time id="post-date" datetime=""></time>
              </span>
              <span class="post-meta-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span id="post-reading-time"></span>
              </span>
              <span class="post-meta-item">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span id="post-author">foxerw</span>
              </span>
            </div>
            
            <div class="post-tags" id="post-tags"></div>
          </header>
          
          <!-- 文章封面图 -->
          <img src="" alt="文章封面" class="post-cover" id="post-cover" style="display: none;" data-src="">
          
          <!-- 文章正文 -->
          <div class="prose article-content" id="post-content">
            <p>正在加载文章内容...</p>
          </div>
          
          <!-- 文章导航 -->
          <nav class="post-navigation" aria-label="文章导航">
            <a href="#" class="post-nav-item prev" id="post-prev" style="display: none;">
              <span class="post-nav-label">← 上一篇</span>
              <span class="post-nav-title" id="post-prev-title"></span>
            </a>
            <a href="#" class="post-nav-item next" id="post-next" style="display: none;">
              <span class="post-nav-label">下一篇 →</span>
              <span class="post-nav-title" id="post-next-title"></span>
            </a>
          </nav>
        </article>
        
        <!-- 侧边栏 - 文章目录 -->
        <aside class="sidebar" role="complementary">
          <div class="toc-container">
            <h3 class="toc-title">目录</h3>
            <nav id="toc-list" aria-label="文章目录">
              <p style="font-size: var(--text-sm); color: var(--color-text-tertiary);">加载中...</p>
            </nav>
          </div>
        </aside>
      </div>
    </div>
  </main>
  
  <!-- 页脚 -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer-content">
        <p class="footer-text">
          © 2024 foxerw 的博客。All rights reserved.
        </p>
        <div class="footer-links">
          <a href="about.html" class="footer-link">关于</a>
          <a href="feed.xml" class="footer-link">RSS</a>
          <a href="sitemap.xml" class="footer-link">站点地图</a>
        </div>
      </div>
    </div>
  </footer>
  
  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/toc.js"></script>
  <script src="js/post.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
