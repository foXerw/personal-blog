<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <!-- SEO Meta -->
  <title>搜索 | foxerw 的博客</title>
  <meta name="description" content="搜索文章内容">
  <meta name="robots" content="noindex">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="images/logo.svg">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- 搜索页面特定样式 -->
  <style>
    .search-page {
      padding: var(--spacing-12) 0;
      max-width: 800px;
      margin: 0 auto;
    }
    
    .search-header {
      text-align: center;
      margin-bottom: var(--spacing-12);
    }
    
    .search-title {
      font-size: var(--text-4xl);
      font-weight: var(--font-bold);
      margin-bottom: var(--spacing-6);
    }
    
    .search-box-large {
      position: relative;
      max-width: 600px;
      margin: 0 auto;
    }
    
    .search-input-large {
      width: 100%;
      padding: var(--spacing-5) var(--spacing-16);
      font-size: var(--text-lg);
      border: 2px solid var(--color-border);
      border-radius: var(--radius-2xl);
      background-color: var(--color-bg-primary);
      color: var(--color-text-primary);
      transition: all var(--transition-fast);
      box-shadow: var(--shadow-sm);
    }
    
    .search-input-large:focus {
      outline: none;
      border-color: var(--color-accent);
      box-shadow: 0 0 0 4px var(--color-accent-light);
    }
    
    .search-icon-large {
      position: absolute;
      left: var(--spacing-5);
      top: 50%;
      transform: translateY(-50%);
      color: var(--color-text-tertiary);
      width: 24px;
      height: 24px;
    }
    
    .search-results {
      margin-top: var(--spacing-8);
    }
    
    .search-stats {
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
      margin-bottom: var(--spacing-6);
    }
    
    .search-result-item {
      padding: var(--spacing-6);
      margin-bottom: var(--spacing-4);
      background-color: var(--color-bg-secondary);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border-light);
      transition: all var(--transition-fast);
    }
    
    .search-result-item:hover {
      border-color: var(--color-accent);
      box-shadow: var(--shadow-sm);
      transform: translateX(4px);
    }
    
    .search-result-title {
      font-size: var(--text-xl);
      font-weight: var(--font-semibold);
      margin-bottom: var(--spacing-2);
    }
    
    .search-result-title a {
      color: var(--color-text-primary);
      text-decoration: none;
    }
    
    .search-result-title a:hover {
      color: var(--color-accent);
      text-decoration: none;
    }
    
    .search-result-meta {
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
      margin-bottom: var(--spacing-3);
    }
    
    .search-result-excerpt {
      font-size: var(--text-base);
      color: var(--color-text-secondary);
      line-height: var(--leading-relaxed);
    }
    
    .search-result-excerpt mark {
      background-color: var(--color-accent-light);
      color: var(--color-text-primary);
      padding: 0.1em 0.2em;
      border-radius: var(--radius-sm);
    }
    
    .search-empty {
      text-align: center;
      padding: var(--spacing-12);
      color: var(--color-text-tertiary);
    }
    
    .search-empty svg {
      margin: 0 auto var(--spacing-4);
      opacity: 0.5;
    }
    
    .search-loading {
      text-align: center;
      padding: var(--spacing-12);
      color: var(--color-text-tertiary);
    }
    
    /* 快捷键提示 */
    .search-shortcut {
      position: absolute;
      right: var(--spacing-4);
      top: 50%;
      transform: translateY(-50%);
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      background: var(--color-bg-tertiary);
      padding: var(--spacing-1) var(--spacing-2);
      border-radius: var(--radius-sm);
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <header class="navbar" role="banner">
    <div class="navbar-content">
      <a href="index.html" class="navbar-brand" aria-label="返回首页">
        <img src="images/logo.svg" alt="Logo" class="navbar-logo" width="36" height="36" onerror="this.style.display='none'">
        <span>foxerw 的博客</span>
      </a>
      
      <nav class="navbar-menu" role="navigation" aria-label="主导航">
        <a href="index.html" class="navbar-link">首页</a>
        <a href="archive.html" class="navbar-link">归档</a>
        <a href="categories.html" class="navbar-link">分类</a>
        <a href="tags.html" class="navbar-link">标签</a>
        <a href="about.html" class="navbar-link">关于</a>
        
        <!-- 主题切换按钮 -->
        <button class="theme-toggle" aria-label="切换主题" title="点击切换主题">
          <span class="icon-sun" aria-hidden="true">☀️</span>
          <span class="icon-moon" aria-hidden="true">🌙</span>
          <span class="icon-auto" aria-hidden="true">🔄</span>
        </button>
      </nav>
      
      <!-- 汉堡菜单按钮 -->
      <button class="hamburger" aria-label="菜单" aria-expanded="false" aria-controls="navbar-menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>
  
  <!-- 主内容区 -->
  <main class="page-wrapper">
    <div class="search-page">
      <!-- 头部 -->
      <header class="search-header">
        <h1 class="search-title">🔍 搜索</h1>
        <div class="search-box-large">
          <svg class="search-icon-large" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" class="search-input-large" id="search-input" placeholder="输入关键词搜索文章..." aria-label="搜索文章" autofocus>
          <span class="search-shortcut">Ctrl+K</span>
        </div>
      </header>
      
      <!-- 搜索结果 -->
      <div class="search-results" id="search-results">
        <p class="search-loading">正在初始化搜索...</p>
      </div>
    </div>
  </main>
  
  <!-- 页脚 -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer-content">
        <p class="footer-text">
          © 2024 foxerw 的博客。All rights reserved.
        </p>
        <div class="footer-links">
          <a href="about.html" class="footer-link">关于</a>
          <a href="feed.xml" class="footer-link">RSS</a>
          <a href="sitemap.xml" class="footer-link">站点地图</a>
        </div>
      </div>
    </div>
  </footer>
  
  <!-- Scripts -->
  <!-- Fuse.js -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
  
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/search.js"></script>
  <script src="js/search-page.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
