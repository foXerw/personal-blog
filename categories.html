<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  
  <!-- SEO Meta -->
  <title>分类 | foxerw 的博客</title>
  <meta name="description" content="按分类浏览文章">
  <meta name="keywords" content="分类，文章分类">
  
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="images/logo.svg">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css?v=1772944793">
  
  <!-- 分类页面特定样式 -->
  <style>
    .categories-header {
      padding: calc(var(--navbar-height) + var(--spacing-12)) 0 var(--spacing-8);
      text-align: center;
    }
    
    .categories-title {
      font-size: var(--text-4xl);
      font-weight: var(--font-bold);
      margin-bottom: var(--spacing-4);
    }
    
    .categories-stats {
      font-size: var(--text-lg);
      color: var(--color-text-secondary);
    }
    
    /* 分类网格 */
    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--spacing-6);
      max-width: 1200px;
      margin: var(--spacing-8) auto;
    }
    
    .category-card {
      display: block;
      padding: var(--spacing-8);
      background: linear-gradient(135deg, var(--color-bg-secondary), var(--color-bg-tertiary));
      border: 1px solid var(--color-border-light);
      border-radius: var(--radius-xl);
      text-decoration: none;
      transition: all var(--transition-normal);
      position: relative;
      overflow: hidden;
    }
    
    .category-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--color-accent), var(--color-accent-hover));
      transform: scaleX(0);
      transition: transform var(--transition-normal);
    }
    
    .category-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
      text-decoration: none;
    }
    
    .category-card:hover::before {
      transform: scaleX(1);
    }
    
    .category-icon {
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-accent-light);
      border-radius: var(--radius-lg);
      font-size: 1.75rem;
      margin-bottom: var(--spacing-4);
    }
    
    .category-name {
      font-size: var(--text-xl);
      font-weight: var(--font-semibold);
      color: var(--color-text-primary);
      margin-bottom: var(--spacing-2);
    }
    
    .category-count {
      font-size: var(--text-sm);
      color: var(--color-text-tertiary);
    }
    
    .category-posts {
      margin-top: var(--spacing-4);
      padding-top: var(--spacing-4);
      border-top: 1px solid var(--color-border);
    }
    
    .category-post-item {
      display: block;
      padding: var(--spacing-2) 0;
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      text-decoration: none;
      transition: color var(--transition-fast);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .category-post-item:hover {
      color: var(--color-accent);
      text-decoration: none;
    }
    
    /* 分类详情模态框 */
    .category-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: var(--z-modal);
      padding: var(--spacing-8);
      overflow-y: auto;
    }
    
    .category-modal.active {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    
    .modal-content {
      background: var(--color-bg-primary);
      border-radius: var(--radius-xl);
      max-width: 800px;
      width: 100%;
      margin-top: var(--spacing-12);
      padding: var(--spacing-8);
      position: relative;
      animation: modalSlideIn 0.3s ease;
    }
    
    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .modal-close {
      position: absolute;
      top: var(--spacing-4);
      right: var(--spacing-4);
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-bg-secondary);
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    
    .modal-close:hover {
      background: var(--color-error);
      color: #ffffff;
    }
    
    .modal-title {
      font-size: var(--text-3xl);
      font-weight: var(--font-bold);
      margin-bottom: var(--spacing-6);
      padding-bottom: var(--spacing-4);
      border-bottom: 2px solid var(--color-accent);
    }
    
    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: var(--spacing-12);
      color: var(--color-text-tertiary);
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->

    <div class="navbar-content">
      <a href="index.html" class="navbar-brand" aria-label="返回首页">
        <img src="images/logo.svg" alt="Logo" class="navbar-logo" width="36" height="36" onerror="this.style.display='none'">
        <span>foxerw 的博客</span>
      </a>
      
      <nav class="navbar-menu" role="navigation" aria-label="主导航">
        <a href="index.html" class="navbar-link">首页</a>
        <a href="archive.html" class="navbar-link">归档</a>
        <a href="categories.html" class="navbar-link active" aria-current="page">分类</a>
        <a href="tags.html" class="navbar-link">标签</a>
        <a href="about.html" class="navbar-link">关于</a>
        
        <!-- 主题切换按钮 -->
        <button class="theme-toggle" aria-label="切换主题" title="点击切换主题">
          <span class="icon-sun" aria-hidden="true">☀️</span>
          <span class="icon-moon" aria-hidden="true">🌙</span>

      </nav>
      
      <!-- 汉堡菜单按钮 -->
      <button class="hamburger" aria-label="菜单" aria-expanded="false" aria-controls="navbar-menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </header>
  
  <!-- 主内容区 -->
  <main class="page-wrapper">
    <div class="container">
      <!-- 头部 -->
      <header class="categories-header">
        <h1 class="categories-title">📁 分类浏览</h1>
        <p class="categories-stats" id="categories-stats">加载中...</p>
      </header>
      
      <!-- 分类网格 -->
      <div class="categories-grid" id="categories-grid">
        <p style="text-align: center; color: var(--color-text-tertiary); grid-column: 1/-1;">加载中...</p>
      </div>
    </div>
  </main>
  
  <!-- 页脚 -->
  <footer class="footer" role="contentinfo">
    <div class="container">
      <div class="footer-content">
        <p class="footer-text">
          © 2024 foxerw 的博客。All rights reserved.
        </p>
        <div class="footer-links">
          <a href="about.html" class="footer-link">关于</a>
          <a href="feed.xml" class="footer-link">RSS</a>
          <a href="sitemap.xml" class="footer-link">站点地图</a>
        </div>
      </div>
    </div>
  </footer>
  
  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/navigation.js"></script>
  <script src="js/categories.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
